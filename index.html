<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albion Resources Calculator - Toutes les ressources</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚒️ Calculateur de Ressources - Albion Online</h1>
            
            <!-- Sélecteurs globaux -->
            <div class="global-controls">
                <div class="server-selector">
                    <label for="server">Serveur :</label>
                    <select id="server">
                        <option value="West">Amérique (West)</option>
                        <option value="East">Asie (East)</option>
                        <option value="Europe" selected>Europe</option>
                    </select>
                    
                    <label for="city">Ville :</label>
                    <select id="city">
                        <option value="Thetford">Thetford</option>
                        <option value="Lymhurst">Lymhurst</option>
                        <option value="Bridgewatch">Bridgewatch</option>
                        <option value="Martlock">Martlock</option>
                        <option value="Fort Sterling">Fort Sterling</option>
                        <option value="Caerleon">Caerleon</option>
                        <option value="Brecilien">Brecilien</option>
                        <option value="BlackMarket">Black Market</option>
                        <option value="Morgana">Morgana</option>
                        <option value="Keeper">Keeper</option>
                        <option value="Undead">Undead</option>
                        <option value="Avalon">Avalon</option>
                    </select>
                    
                    <button id="refreshPrices" class="btn-primary">🔄 Mettre à jour tous les prix</button>
                </div>
                
                <div class="last-update">
                    Dernière mise à jour : <span id="updateTime">-</span>
                </div>
                <div id="api-status" class="api-status info">Initialisation...</div>
            </div>
            
            <!-- Navigation par onglets -->
            <div class="resource-tabs">
                <button class="tab-btn active" data-resource="wood">🌲 Bois</button>
                <button class="tab-btn" data-resource="stone">🪨 Pierre</button>
                <button class="tab-btn" data-resource="ore">⛏️ Minerai</button>
                <button class="tab-btn" data-resource="hide">🦌 Cuir</button>
                <button class="tab-btn" data-resource="fiber">🌿 Fibre</button>
            </div>
        </header>

        <main>
            <!-- Conteneur du tableau actif -->
            <div class="table-container" id="table-container">
                <!-- Rempli par JavaScript -->
            </div>
            
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Chargement des prix depuis l'API...</p>
            </div>
            
            <div class="info-panel" id="info-panel">
                <h3 id="resource-info-title">📊 Informations sur les ressources</h3>
                <div id="resource-info-content">
                    <p>Sélectionnez une ressource pour voir ses informations.</p>
                </div>
                <div id="enchant-legend"></div>
            </div>
        </main>
    </div>
    
    <script src="resources-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
